# Standard logging policy reused across services so /var/lib/docker doesn't
# fill from unbounded JSON-file driver defaults.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: '10m'
    max-file: '3'

services:
  app:
    # Pulled from GHCR — see ADR-0011. The tag is the commit SHA of
    # the currently-deployed revision, set by scripts/deploy.sh via
    # APP_IMAGE_TAG (see ADR-0012 for the manual pull-based deploy
    # flow that replaces the former deploy.yml). No default: the `:?`
    # substitution refuses to start compose without an explicit tag,
    # so an unsynchronised `docker compose up` cannot silently pull
    # `:main` (which was the pre-C2-audit default and drifted from
    # whatever branch the operator was actually on). scripts/deploy.sh
    # exports APP_IMAGE_TAG before every compose invocation; the dev
    # overlay (docker-compose.dev.yml) reintroduces `build: .` so
    # local development still builds from source.
    image: ghcr.io/vlzware/projekt-manager:${APP_IMAGE_TAG:?APP_IMAGE_TAG must be set}
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 512m
    cpus: 1.0
    environment:
      # `:?` gates the operator-supplied secrets at compose parse time —
      # without them, compose refuses to start the stack rather than
      # substituting an empty password into the connection string and
      # letting the container crash-loop against "authentication
      # failed". Gating at the first occurrence per var is enough:
      # compose aborts the whole parse on any `:?` failure, so later
      # references (db/storage/storage-init/backup services) can stay
      # bare for readability. Pairs with `secrets.manifest.txt` and the
      # deploy-time pre-flight in `scripts/deploy.sh`.
      DATABASE_URL: postgresql://pm:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@db:5432/projekt_manager
      STORAGE_ENDPOINT: http://storage:9000
      # Public hostname the browser uses to reach MinIO. Caddy
      # reverse-proxies `storage.${DOMAIN}` to the internal `storage:9000`
      # (see Caddyfile) and the app signs presigned upload / download URLs
      # against this host so they are actually resolvable from the
      # browser. `:?`-gated here at first reference so compose refuses to
      # parse without DOMAIN rather than producing a broken
      # `https://storage./...` URL (same pattern as POSTGRES_PASSWORD
      # etc. above). Later references (line MINIO_API_CORS_ALLOW_ORIGIN,
      # the caddy service's env) can stay bare — compose aborts the whole
      # parse on any `:?` failure.  Defense-in-depth:
      # `assertStoragePublicEndpointInProduction()` also refuses to boot
      # when STORAGE_ENDPOINT looks internal and this value is missing.
      # See docs/ops/storage-subdomain.md.
      STORAGE_PUBLIC_ENDPOINT: https://storage.${DOMAIN:?DOMAIN must be set}
      STORAGE_BUCKET: projekt-manager
      STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set}
      STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}
      NODE_ENV: production
      PORT: '3000'
      SEED: ${SEED:-false}
      # First-run admin bootstrap (ADR-0010 / #57). Optional with an empty
      # default so the container starts fine when the operator hasn't set
      # them — the bootstrap code itself handles "neither var set" as the
      # AC-B4 silent no-op path. `:-` is required: without it, docker compose
      # warns and substitutes the literal empty string inconsistently across
      # versions. Leaving these out of `environment:` silently hides the
      # .env values from the container, which is how they got missed on the
      # first deploy of this feature.
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      BOOTSTRAP_ADMIN_DISPLAY_NAME: ${BOOTSTRAP_ADMIN_DISPLAY_NAME:-}
      ALLOW_INSECURE_HTTP: ${ALLOW_INSECURE_HTTP:-false}
      # OpenRouter LLM extraction (ADR-0016). Optional — feature is
      # disabled when the key is absent.
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-google/gemini-2.5-flash-lite}
      # Periodic session-reaper cadence. Default 60 min matches env.ts;
      # lower values tighten revocation latency at the cost of more DB
      # traffic. Forwarded explicitly so the container sees the override
      # — without this line, the Zod schema silently falls back to its
      # default at runtime (the failure mode check-env-drift.sh guards).
      SESSION_CLEANUP_INTERVAL_MINUTES: ${SESSION_CLEANUP_INTERVAL_MINUTES:-60}
      # Login-rate-limit ceiling (issue #139, AC-228). Empty default keeps
      # the env-aware build-time fallback in `getRateLimit()` (5/min in
      # prod, 30/min elsewhere); set a numeric value to override.
      LOGIN_RATE_LIMIT_MAX: ${LOGIN_RATE_LIMIT_MAX:-}
      # Audit-log retention cleanup (ADR-0021). Window defaults to the
      # [C] constant in src/config/auditRetention.ts (90 days); leave
      # blank to use that default. Interval default 1440 min (daily).
      AUDIT_RETENTION_WINDOW_DAYS: ${AUDIT_RETENTION_WINDOW_DAYS:-}
      AUDIT_RETENTION_INTERVAL_MINUTES: ${AUDIT_RETENTION_INTERVAL_MINUTES:-1440}
      # Attachments (data-model.md §5.13, architecture.md §12.2). All
      # caps / TTLs are [C] — defaults live in
      # src/config/attachmentConfig.ts. Leave blank to use the defaults.
      ATTACHMENT_PER_FILE_CAP_BYTES: ${ATTACHMENT_PER_FILE_CAP_BYTES:-}
      ATTACHMENT_BULK_MAX_FILES: ${ATTACHMENT_BULK_MAX_FILES:-}
      ATTACHMENT_BULK_MAX_BYTES: ${ATTACHMENT_BULK_MAX_BYTES:-}
      ATTACHMENT_ORPHAN_REAPER_TTL_MINUTES: ${ATTACHMENT_ORPHAN_REAPER_TTL_MINUTES:-}
      ATTACHMENT_ORPHAN_REAPER_INTERVAL_MINUTES: ${ATTACHMENT_ORPHAN_REAPER_INTERVAL_MINUTES:-}
      ATTACHMENT_WORKER_SELF_DELETE_GRACE_MINUTES: ${ATTACHMENT_WORKER_SELF_DELETE_GRACE_MINUTES:-}
      # Web Push / VAPID (ADR-0023). Both optional — when unset the
      # server installs a no-op dispatcher and the UI opt-in reports
      # "nicht konfiguriert". VAPID_PRIVATE_KEY is a secret (lives in
      # secrets.env.age); VAPID_SUBJECT is non-secret operator config.
      # See docs/ops/manual-deploy.md § Secrets.
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
      # Layer 2 backup (ADR-0020). The `backup` service is the actual
      # runtime consumer; forwarded into the `app` container ONLY so the
      # deploy pre-flight CLI (scripts/deploy.sh:209 → `docker compose
      # run --rm --no-deps app node /app/dist/server/deploy-preflight-cli.js`)
      # sees them when computing `formatFeatureManifest()`. Without this
      # block the manifest reports "backup disabled — R2_ACCESS_KEY_ID
      # is not set" even when the operator has every key in
      # secrets.env.age — a false negative that defeats the manifest's
      # whole purpose. The app's runtime code does not reference these
      # (backup-runner.ts ships in a different image, ADR-0020). Empty
      # `:-` defaults so dev workflows without secrets sourced still
      # parse compose; the deploy-time pre-flight is the only place that
      # actually reads them.
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_BUCKET: ${R2_BUCKET:-projekt-manager-backups}
      AGE_RECIPIENT: ${AGE_RECIPIENT:-}
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3000/api/health').then(r=>{if(!r.ok)process.exit(1)})",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
      storage-init:
        condition: service_completed_successfully
    restart: unless-stopped
    logging: *default-logging

  db:
    image: postgres:17-alpine
    mem_limit: 512m
    cpus: 1.0
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: projekt_manager
      POSTGRES_USER: pm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pm -d projekt_manager']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    logging: *default-logging

  storage:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    mem_limit: 512m
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # Allow only the app's own origin to POST uploads via presigned
      # URLs. S3 presigned POSTs are "simple" CORS requests, so the
      # browser still enforces the response's Access-Control-Allow-Origin
      # before it lets JS read the result. `*` would work but is
      # needlessly permissive — we know the sole legitimate caller.
      MINIO_API_CORS_ALLOW_ORIGIN: https://${DOMAIN}
    restart: unless-stopped
    logging: *default-logging

  storage-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      - storage
    entrypoint: /bin/sh
    command: /init-storage.sh
    volumes:
      # Long-form bind with `create_host_path: false` — see the
      # rationale on the same pattern in docker-compose.dev.yml's
      # `db.volumes`. dockerd runs as root and silently materialises
      # missing bind-mount sources as root-owned directories on the
      # host. Refusing to auto-create converts that footgun into a
      # loud "source does not exist" error at compose up time.
      - type: bind
        source: ./docker/init-storage.sh
        target: /init-storage.sh
        read_only: true
        bind:
          create_host_path: false
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      STORAGE_BUCKET: projekt-manager
      # ADR-0022 / docs/ops/object-storage-provisioning.md — R and L
      # dials. Forwarded with defaults so unset vars don't collapse to
      # empty strings (mc rejects "0d").
      STORAGE_OBJECT_LOCK_DAYS: ${STORAGE_OBJECT_LOCK_DAYS:-1}
      STORAGE_LIFECYCLE_HIDE_TO_DELETE_DAYS: ${STORAGE_LIFECYCLE_HIDE_TO_DELETE_DAYS:-2}
    restart: 'no'

  backup:
    # Layer 2 encrypted backup service — see ADR-0020 and
    # docs/spec/architecture.md §11.10. Runs a dcron loop that fires
    # run-backup.sh five times on weekdays (09/12/15/18/21 Europe/Berlin)
    # and once on weekends (12:00), with run-drill.sh at a +2 min offset
    # on each tick. Retention is linear (R2 bucket lock + 90-day
    # lifecycle); no in-container rotation step.
    #
    # Pulled from GHCR — mirrors the `app` service's shape (ADR-0011's
    # "build in CI, distribute via GHCR" invariant extends to this
    # image; see .github/workflows/ci.yml build-and-push job). The tag
    # is the commit SHA of the currently-deployed revision, set by
    # scripts/deploy.sh via APP_IMAGE_TAG. No default: mirrors the
    # `app` service's `:?` gate so compose refuses to start without an
    # explicit tag. Mutable branch-tag defaults (`:main`, an iteration
    # slug) previously risked silently pulling stale code on a manual
    # `docker compose up`; the only safe way to run is with an
    # operator-supplied SHA.
    image: ghcr.io/vlzware/projekt-manager-backup:${APP_IMAGE_TAG:?APP_IMAGE_TAG must be set}
    # dcron exec'd as PID 1 hits Docker's PID-1 protection: its fork()+
    # setpgid() for each cron entry fails with "setpgid: Operation not
    # permitted" and the container crash-loops. `init: true` puts tini as
    # PID 1 so crond runs as PID 2+ and its children can setpgid normally.
    # Caught on the first test deploy of iteration/7-data — CI builds the
    # image but never boots it, so the runtime crash never surfaced in CI.
    init: true
    read_only: true
    tmpfs:
      # Operator-loaded drill identity (AC-175). The script
      # load-drill-key.sh asserts this mount is tmpfs before writing;
      # removing this directive will make the script refuse rather
      # than persist the identity to disk.
      - /run/drill-key:mode=0700,uid=0,gid=0
      # Ephemeral Postgres workdir for Tier 1 verify-on-create
      # (initdb output, WAL, socket) AND lockfile scratch for
      # run-{backup,drill}.sh. Kept out of any volume because
      # it must never survive a run — the integrity proof is that
      # the process starts from initdb every time.
      #
      # Historically there was a second `- /var/run` mount here for
      # the lockfiles, but on Alpine /var/run is a symlink to /run,
      # so that tmpfs landed on /run and shadowed /run/drill-key
      # above it (tmpfs mounts stack in list order; a fresh /run
      # tmpfs hides every earlier mount under /run/*). Moving locks
      # to /tmp drops one mount and the shadowing problem with it.
      - /tmp
    mem_limit: 512m
    cpus: 1.0
    environment:
      # Same DATABASE_URL as the app — the backup service reads the
      # canonical DB for pg_dump + manifest (AC-174 checksum query).
      DATABASE_URL: postgresql://pm:${POSTGRES_PASSWORD}@db:5432/projekt_manager
      # Cloudflare R2 credentials + bucket + recipient — sourced from
      # secrets.env.age via scripts/deploy.sh (see
      # docs/ops/backup/setup.md §3 for provisioning). AGE_RECIPIENT is
      # the PUBLIC recipient only; the private identity is
      # operator-held and loaded into tmpfs via load-drill-key.sh per
      # docs/ops/backup/drills.md § Loading the drill key (AC-175).
      # `:-` empty defaults silence compose's "variable is not set"
      # warnings when the operator hasn't sourced secrets.env.age (dev
      # workflows, where the `backup` profile stays gated off). In
      # prod, deploy.sh sources secrets into the shell env before
      # compose, and shell env always beats a compose default — so
      # the defaults here never mask a genuinely missing secret at
      # runtime. The backup service itself validates these at startup
      # (scripts/backup/entrypoint.sh) and refuses to run on empties.
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_BUCKET: ${R2_BUCKET:-projekt-manager-backups}
      R2_REGION: ${R2_REGION:-auto}
      AGE_RECIPIENT: ${AGE_RECIPIENT:-}
      # Tmpfs path where the operator loads the age private identity
      # for Tier 2 drills (AC-168, AC-175). Default matches the tmpfs
      # mount above and scripts/backup/run-drill.sh — kept explicit in
      # compose so check-env-drift.sh sees it and so the runner's Zod
      # schema cannot silently fall back to its default at runtime.
      AGE_IDENTITY_PATH: ${AGE_IDENTITY_PATH:-/run/drill-key/identity}
      # Container-local timezone. The crontab entries are written in
      # Europe/Berlin local time (see scripts/backup/crontab) so the
      # schedule tracks human working hours and DST transitions
      # automatically. tzdata must be installed in the image
      # (Dockerfile.backup) for this to take effect; without it dcron
      # silently falls back to UTC.
      TZ: Europe/Berlin
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    # No `ports:` — the backup service speaks only to `db` over the
    # internal compose network and to R2 outbound. No inbound surface
    # from anywhere.
    restart: unless-stopped
    logging: *default-logging
    profiles:
      # Omitted from a bare `docker compose up` so local dev doesn't
      # spin up a cron loop with empty R2 creds. Production deploy
      # opts in via `--profile backup` (scripts/deploy.sh sets this);
      # the runbook references the same profile.
      - backup

  caddy:
    build: ./docker/caddy
    mem_limit: 128m
    # SECURITY: Caddy's :443 listener is published only on the WireGuard
    # interface IP. WG_BIND_IP must be set to the wg0 address (e.g.
    # 10.213.17.1) in production. If unset, defaults to 127.0.0.1 (loopback
    # only) — safe for local dev where Caddy must not be reachable from any
    # external interface. Do NOT change this to 0.0.0.0 without also
    # opening the Hetzner firewall, which defeats the VPN-first principle.
    # See ADR-0008 §Network topology.
    ports:
      - '${WG_BIND_IP:-127.0.0.1}:443:443'
    volumes:
      # Long-form bind with `create_host_path: false` — see the
      # rationale on the same pattern in docker-compose.dev.yml's
      # `db.volumes`. Caddy is gated off in dev (profile: production),
      # so this guard mostly protects production deploys where a
      # missing Caddyfile must fail loudly rather than silently
      # materialise as a root-owned empty directory.
      - type: bind
        source: ./Caddyfile
        target: /etc/caddy/Caddyfile
        read_only: true
        bind:
          create_host_path: false
      - caddy_data:/data
      - caddy_config:/config
    environment:
      # DOMAIN is `:?`-gated at first reference (app service above); this
      # later substitution inherits that guard. Keeping a `:-localhost`
      # default here would be dead code.
      DOMAIN: ${DOMAIN}
      # `?` (no colon) — must be DECLARED but may be empty. Local dev
      # and the HTTP-only overlay leave it empty because Caddy is
      # profile-gated off there (docker-compose.dev.yml). Production
      # supplies the value via `secrets.env.age`; `secrets.manifest.txt`
      # + deploy-time pre-flight catch the missing-key case there.
      # `:?` (abort on empty) would wrongly fire in local dev where
      # `.env` has `CLOUDFLARE_API_TOKEN=` intentionally.
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN?CLOUDFLARE_API_TOKEN must be declared}
    depends_on:
      - app
    restart: unless-stopped
    logging: *default-logging

volumes:
  pgdata:
  miniodata:
  caddy_data:
  caddy_config:
