# Standard logging policy reused across services so /var/lib/docker doesn't
# fill from unbounded JSON-file driver defaults.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: '10m'
    max-file: '3'

services:
  app:
    # Pulled from GHCR — see ADR-0011. The tag is the commit SHA of
    # the currently-deployed revision, set by deploy.yml via
    # APP_IMAGE_TAG. Default falls back to the `main` branch tag so
    # a manual `docker compose up` on the VPS picks up a sensible
    # image without requiring the env var. The dev overlay
    # (docker-compose.dev.yml) reintroduces `build: .` so local
    # development still builds from source.
    image: ghcr.io/vlzware/projekt-manager:${APP_IMAGE_TAG:-main}
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 512m
    cpus: 1.0
    environment:
      DATABASE_URL: postgresql://pm:${POSTGRES_PASSWORD}@db:5432/projekt_manager
      STORAGE_ENDPOINT: http://storage:9000
      STORAGE_BUCKET: projekt-manager
      STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER}
      STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      NODE_ENV: production
      PORT: '3000'
      SEED: ${SEED:-false}
      # First-run admin bootstrap (ADR-0010 / #57). Optional with an empty
      # default so the container starts fine when the operator hasn't set
      # them — the bootstrap code itself handles "neither var set" as the
      # AC-B4 silent no-op path. `:-` is required: without it, docker compose
      # warns and substitutes the literal empty string inconsistently across
      # versions. Leaving these out of `environment:` silently hides the
      # .env values from the container, which is how they got missed on the
      # first deploy of this feature.
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      BOOTSTRAP_ADMIN_DISPLAY_NAME: ${BOOTSTRAP_ADMIN_DISPLAY_NAME:-}
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3000/api/health').then(r=>{if(!r.ok)process.exit(1)})",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
      storage-init:
        condition: service_completed_successfully
    restart: unless-stopped
    logging: *default-logging

  db:
    image: postgres:17-alpine
    mem_limit: 512m
    cpus: 1.0
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: projekt_manager
      POSTGRES_USER: pm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pm -d projekt_manager']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    logging: *default-logging

  storage:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    mem_limit: 512m
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    restart: unless-stopped
    logging: *default-logging

  storage-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      - storage
    entrypoint: /bin/sh
    command: /init-storage.sh
    volumes:
      - ./docker/init-storage.sh:/init-storage.sh:ro
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      STORAGE_BUCKET: projekt-manager
    restart: 'no'

  caddy:
    build: ./docker/caddy
    mem_limit: 128m
    # SECURITY: Caddy's :443 listener is published only on the WireGuard
    # interface IP. WG_BIND_IP must be set to the wg0 address (e.g.
    # 10.213.17.1) in production. If unset, defaults to 127.0.0.1 (loopback
    # only) — safe for local dev where Caddy must not be reachable from any
    # external interface. Do NOT change this to 0.0.0.0 without also
    # opening the Hetzner firewall, which defeats the VPN-first principle.
    # See ADR-0008 §Network topology.
    ports:
      - '${WG_BIND_IP:-127.0.0.1}:443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
    depends_on:
      - app
    restart: unless-stopped
    logging: *default-logging

volumes:
  pgdata:
  miniodata:
  caddy_data:
  caddy_config:
