# Standard logging policy reused across services so /var/lib/docker doesn't
# fill from unbounded JSON-file driver defaults.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: '10m'
    max-file: '3'

services:
  app:
    # Pulled from GHCR — see ADR-0011. The tag is the commit SHA of
    # the currently-deployed revision, set by scripts/deploy.sh via
    # APP_IMAGE_TAG (see ADR-0012 for the manual pull-based deploy
    # flow that replaces the former deploy.yml). No default: the `:?`
    # substitution refuses to start compose without an explicit tag,
    # so an unsynchronised `docker compose up` cannot silently pull
    # `:main` (which was the pre-C2-audit default and drifted from
    # whatever branch the operator was actually on). scripts/deploy.sh
    # exports APP_IMAGE_TAG before every compose invocation; the dev
    # overlay (docker-compose.dev.yml) reintroduces `build: .` so
    # local development still builds from source.
    image: ghcr.io/vlzware/projekt-manager:${APP_IMAGE_TAG:?APP_IMAGE_TAG must be set}
    read_only: true
    tmpfs:
      - /tmp
      # Operator-loaded binary `age` identity (ADR-0024). load-binary-key.sh
      # asserts this mount is tmpfs before writing the private identity;
      # the boot probe (assertBinaryIdentityLoaded) reads it back before
      # the app accepts requests. uid/gid 1001 matches the `app` user
      # pinned in the Dockerfile — both the boot probe (read) and the
      # loader script (write) run as `app`, so the tmpfs must be owned
      # by that uid. Mode 0700 keeps it unreadable to any other uid.
      - /run/binary-key:mode=0700,uid=1001,gid=1001
    mem_limit: 512m
    cpus: 1.0
    environment:
      # `:?` gates the operator-supplied secrets at compose parse time —
      # without them, compose refuses to start the stack rather than
      # substituting an empty password into the connection string and
      # letting the container crash-loop against "authentication
      # failed". Gating at the first occurrence per var is enough:
      # compose aborts the whole parse on any `:?` failure, so later
      # references (db/storage/storage-init/backup services) can stay
      # bare for readability. Pairs with `secrets.manifest.txt` and the
      # deploy-time pre-flight in `scripts/deploy.sh`.
      DATABASE_URL: postgresql://pm:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@db:5432/projekt_manager
      # Object storage endpoint. Operator-supplied per deployment because
      # the value is provider-specific: B2's S3-compat surface in prod
      # (`https://s3.<region>.backblazeb2.com`), the in-compose MinIO
      # service in dev (`http://storage:9000`, set by the dev overlay).
      # `:?`-gated so a missing value fails compose-parse rather than
      # silently substituting empty and crash-looping the SDK.
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:?STORAGE_ENDPOINT must be set}
      # Optional public endpoint the browser uses for presigned URLs.
      # When unset, the storage client signs against `STORAGE_ENDPOINT` —
      # correct for B2 prod (browser hits B2 directly) and for dev when
      # MinIO is exposed on the host. Set to a reverse-proxied hostname
      # ONLY when `STORAGE_ENDPOINT` is a container-only host the browser
      # cannot reach. Defense-in-depth:
      # `assertStoragePublicEndpointInProduction()` refuses to boot when
      # `STORAGE_ENDPOINT` looks internal and this value is missing.
      STORAGE_PUBLIC_ENDPOINT: ${STORAGE_PUBLIC_ENDPOINT:-}
      # Bucket name. `:?`-gated because B2 buckets have operator-chosen
      # globally-unique names (no sane default), and MinIO dev should
      # state its bucket explicitly via `.env` rather than relying on a
      # silent fallback that would diverge from the init script.
      STORAGE_BUCKET: ${STORAGE_BUCKET:?STORAGE_BUCKET must be set}
      # Optional per-process key prefix. Production leaves this unset so
      # callers store bare keys; the vitest integration suite sets
      # `test-<pid>/` via `process.env` (src/test/integration-setup.ts) for
      # per-fork isolation inside the shared test bucket. Forwarded here
      # only so check-env-drift.sh sees it — without this line, the Zod
      # schema's optional() would silently mask a missing-in-compose drift
      # if a production caller ever did need to set it.
      STORAGE_KEY_PREFIX: ${STORAGE_KEY_PREFIX:-}
      # SigV4 signing region. MinIO accepts any value (us-east-1 in dev);
      # B2 verifies against the bucket-bound region (`us-west-002`,
      # `eu-central-003`, …) and rejects mismatches with
      # SignatureDoesNotMatch. `:?`-gated so a missing value fails parse
      # rather than silently signing with the SDK default and 403'ing.
      STORAGE_REGION: ${STORAGE_REGION:?STORAGE_REGION must be set}
      # Capability-restricted credential — writeFiles/readFiles/listFiles
      # only on B2 (per b2 key create in docs/ops/object-storage-provisioning.md);
      # the equivalent restricted MinIO user in dev (per docker/init-storage.sh).
      # The boot-time capability self-test in src/server/storage/safety.ts
      # asserts this credential CANNOT destroy versions and refuses to
      # serve otherwise — so the app MUST run as the restricted user.
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:?STORAGE_ACCESS_KEY must be set}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:?STORAGE_SECRET_KEY must be set}
      NODE_ENV: production
      PORT: '3000'
      SEED: ${SEED:-false}
      # First-run admin bootstrap (ADR-0010 / #57). Optional with an empty
      # default so the container starts fine when the operator hasn't set
      # them — the bootstrap code itself handles "neither var set" as the
      # AC-B4 silent no-op path. `:-` is required: without it, docker compose
      # warns and substitutes the literal empty string inconsistently across
      # versions. Leaving these out of `environment:` silently hides the
      # .env values from the container, which is how they got missed on the
      # first deploy of this feature.
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      BOOTSTRAP_ADMIN_DISPLAY_NAME: ${BOOTSTRAP_ADMIN_DISPLAY_NAME:-}
      ALLOW_INSECURE_HTTP: ${ALLOW_INSECURE_HTTP:-false}
      # OpenRouter LLM extraction (ADR-0016). Optional — feature is
      # disabled when the key is absent.
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-google/gemini-2.5-flash-lite}
      # Periodic session-reaper cadence. Default 60 min matches env.ts;
      # lower values tighten revocation latency at the cost of more DB
      # traffic. Forwarded explicitly so the container sees the override
      # — without this line, the Zod schema silently falls back to its
      # default at runtime (the failure mode check-env-drift.sh guards).
      SESSION_CLEANUP_INTERVAL_MINUTES: ${SESSION_CLEANUP_INTERVAL_MINUTES:-60}
      # Login-rate-limit ceiling (issue #139, AC-228). Empty default keeps
      # the env-aware build-time fallback in `getRateLimit()` (5/min in
      # prod, 30/min elsewhere); set a numeric value to override.
      LOGIN_RATE_LIMIT_MAX: ${LOGIN_RATE_LIMIT_MAX:-}
      # Audit-log retention cleanup (ADR-0021). Window defaults to the
      # [C] constant in src/config/auditRetention.ts (90 days); leave
      # blank to use that default. Interval default 1440 min (daily).
      AUDIT_RETENTION_WINDOW_DAYS: ${AUDIT_RETENTION_WINDOW_DAYS:-}
      AUDIT_RETENTION_INTERVAL_MINUTES: ${AUDIT_RETENTION_INTERVAL_MINUTES:-1440}
      # Attachments (data-model.md §5.13, architecture.md §12.2). All
      # caps / TTLs are [C] — defaults live in
      # src/config/attachmentConfig.ts. Leave blank to use the defaults.
      ATTACHMENT_PER_FILE_CAP_BYTES: ${ATTACHMENT_PER_FILE_CAP_BYTES:-}
      ATTACHMENT_THUMB_CAP_BYTES: ${ATTACHMENT_THUMB_CAP_BYTES:-}
      ATTACHMENT_BULK_MAX_FILES: ${ATTACHMENT_BULK_MAX_FILES:-}
      ATTACHMENT_BULK_MAX_BYTES: ${ATTACHMENT_BULK_MAX_BYTES:-}
      ATTACHMENT_ORPHAN_REAPER_TTL_MINUTES: ${ATTACHMENT_ORPHAN_REAPER_TTL_MINUTES:-}
      ATTACHMENT_ORPHAN_REAPER_INTERVAL_MINUTES: ${ATTACHMENT_ORPHAN_REAPER_INTERVAL_MINUTES:-}
      ATTACHMENT_HIDDEN_REAPER_TTL_MINUTES: ${ATTACHMENT_HIDDEN_REAPER_TTL_MINUTES:-}
      ATTACHMENT_HIDDEN_REAPER_INTERVAL_MINUTES: ${ATTACHMENT_HIDDEN_REAPER_INTERVAL_MINUTES:-}
      ATTACHMENT_WORKER_SELF_DELETE_GRACE_MINUTES: ${ATTACHMENT_WORKER_SELF_DELETE_GRACE_MINUTES:-}
      # Invoice retention (ADR-0026, architecture.md §12.2). Object-Lock
      # days for rendered invoice PDF/A-3 binaries; 0 disables the
      # boot-time retention assertion (dev), 3650 in production (§147 AO).
      # The boot-time bucket-safety probe refuses to start when the
      # deployed bucket retention envelope is less than this value.
      INVOICE_OBJECT_LOCK_DAYS: ${INVOICE_OBJECT_LOCK_DAYS:-}
      # Realtime invalidation channel heartbeat (ADR-0025,
      # api.md §14.2.13). Defaults to 25 s; integration tests override
      # to drive heartbeat assertions in milliseconds.
      SSE_HEARTBEAT_INTERVAL_MS: ${SSE_HEARTBEAT_INTERVAL_MS:-}
      # Web Push / VAPID (ADR-0023). Both optional — when unset the
      # server installs a no-op dispatcher and the UI opt-in reports
      # "nicht konfiguriert". VAPID_PRIVATE_KEY is a secret (lives in
      # secrets.env.age); VAPID_SUBJECT is non-secret operator config.
      # See docs/ops/manual-deploy.md § Secrets.
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
      # Layer 2 backup (ADR-0020). The `backup` service is the actual
      # runtime consumer; forwarded into the `app` container ONLY so the
      # deploy pre-flight CLI (scripts/deploy.sh:209 → `docker compose
      # run --rm --no-deps app node /app/dist/server/deploy-preflight-cli.js`)
      # sees them when computing `formatFeatureManifest()`. Without this
      # block the manifest reports "backup disabled — R2_ACCESS_KEY_ID
      # is not set" even when the operator has every key in
      # secrets.env.age — a false negative that defeats the manifest's
      # whole purpose. The app's runtime code does not reference these
      # (backup-runner.ts ships in a different image, ADR-0020). Empty
      # `:-` defaults so dev workflows without secrets sourced still
      # parse compose; the deploy-time pre-flight is the only place that
      # actually reads them.
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_BUCKET: ${R2_BUCKET:-projekt-manager-backups}
      AGE_RECIPIENT: ${AGE_RECIPIENT:-}
      # Binary attachment e2e encryption (ADR-0024). The recipient is the
      # public half of the operator-held binary `age` keypair — independent
      # from AGE_RECIPIENT (backup) so a single compromise does not span
      # both domains. The identity (private half) is operator-loaded into
      # the tmpfs mount above via scripts/binary-key/load-binary-key.sh
      # after each VPS reboot; the boot probe refuses to start without it.
      BINARY_AGE_RECIPIENT: ${BINARY_AGE_RECIPIENT:-}
      BINARY_AGE_IDENTITY_PATH: ${BINARY_AGE_IDENTITY_PATH:-/run/binary-key/identity}
    # No `healthcheck:` on app. /api/health is a real probe (DB query +
    # B2 ListObjectsV2) and Docker would invoke it every 10 s for the
    # lifetime of the container — burning ~8,640 B2 Class C transactions
    # per day with no consumer (Caddy uses its own /.well-known/healthz,
    # nothing depends on `service_healthy` on app, restart:unless-stopped
    # does not act on the unhealthy flag). The deploy + sync scripts hit
    # /api/health one-shot as a smoke gate; that's the only consumer the
    # endpoint actually has.
    depends_on:
      db:
        condition: service_healthy
      # No storage dependency in the base file: prod talks to an external
      # provider (B2). The dev overlay re-introduces a `storage-init`
      # dependency for the in-compose MinIO mirror.
    restart: unless-stopped
    logging: *default-logging

  db:
    image: postgres:17-alpine
    mem_limit: 512m
    cpus: 1.0
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: projekt_manager
      POSTGRES_USER: pm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pm -d projekt_manager']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    logging: *default-logging

  # Note: the in-compose MinIO services (`storage`, `storage-init`) live
  # in `docker-compose.dev.yml`. Production deploys talk to an external
  # provider (Backblaze B2) configured via `STORAGE_*` env vars; running
  # MinIO alongside on the VPS would be dead infrastructure. See
  # docs/ops/object-storage-provisioning.md.

  backup:
    # Layer 2 encrypted backup service — see ADR-0020 and
    # docs/spec/architecture.md §11.10. Runs an in-process croner
    # schedule (src/server/backup-runner.ts → `schedule` subcommand)
    # that fires runBackup five times on weekdays (09/12/15/18/21
    # Europe/Berlin) and once on weekends (12:00), with runDrill at a
    # +2 min offset on each tick. Retention is linear (R2 bucket lock
    # + 90-day lifecycle); no in-container rotation step.
    #
    # Pulled from GHCR — mirrors the `app` service's shape (ADR-0011's
    # "build in CI, distribute via GHCR" invariant extends to this
    # image; see .github/workflows/ci.yml build-and-push job). The tag
    # is the commit SHA of the currently-deployed revision, set by
    # scripts/deploy.sh via APP_IMAGE_TAG. No default: mirrors the
    # `app` service's `:?` gate so compose refuses to start without an
    # explicit tag. Mutable branch-tag defaults (`:main`, an iteration
    # slug) previously risked silently pulling stale code on a manual
    # `docker compose up`; the only safe way to run is with an
    # operator-supplied SHA.
    image: ghcr.io/vlzware/projekt-manager-backup:${APP_IMAGE_TAG:?APP_IMAGE_TAG must be set}
    # No `init: true` — the historical reason was dcron's fork()+
    # setpgid() per cron entry tripping Docker's PID-1 protection.
    # croner does not fork; Node-as-PID-1 reaps its own children via
    # libuv and handles SIGTERM in scheduleSubcommand for a graceful
    # drain. See #199 for the rearchitecture context.
    read_only: true
    tmpfs:
      # Operator-loaded drill identity (AC-175). The script
      # load-drill-key.sh asserts this mount is tmpfs before writing;
      # removing this directive will make the script refuse rather
      # than persist the identity to disk.
      #
      # uid=70,gid=70 = the `postgres` system user created by the
      # postgresql17 apk package — the container's USER (Dockerfile.backup
      # USER directive). Without matching ownership, the loader would
      # be unable to write the identity even though it can resolve
      # the path.
      - /run/drill-key:mode=0700,uid=70,gid=70
      # Ephemeral Postgres workdir for Tier 1 verify-on-create
      # (initdb output, WAL, socket). Kept out of any volume because
      # it must never survive a run — the integrity proof is that
      # the process starts from initdb every time.
      #
      # Historically there was a second `- /var/run` mount here for
      # bash-side flock lockfiles, but on Alpine /var/run is a symlink
      # to /run, so that tmpfs landed on /run and shadowed /run/drill-key
      # above it (tmpfs mounts stack in list order; a fresh /run
      # tmpfs hides every earlier mount under /run/*). flock is gone
      # with the bash scripts (#199 — croner's `protect: true` is the
      # in-process equivalent), and the remaining transient writes
      # land under /tmp.
      - /tmp
    mem_limit: 512m
    cpus: 1.0
    environment:
      # Same DATABASE_URL as the app — the backup service reads the
      # canonical DB for pg_dump + manifest (AC-174 checksum query).
      DATABASE_URL: postgresql://pm:${POSTGRES_PASSWORD}@db:5432/projekt_manager
      # Cloudflare R2 credentials + bucket + recipient — sourced from
      # secrets.env.age via scripts/deploy.sh (see
      # docs/ops/backup/setup.md §3 for provisioning). AGE_RECIPIENT is
      # the PUBLIC recipient only; the private identity is
      # operator-held and loaded into tmpfs via load-drill-key.sh per
      # docs/ops/backup/drills.md § Loading the drill key (AC-175).
      # `:-` empty defaults silence compose's "variable is not set"
      # warnings when the operator hasn't sourced secrets.env.age (dev
      # workflows, where the `backup` profile stays gated off). In
      # prod, deploy.sh sources secrets into the shell env before
      # compose, and shell env always beats a compose default — so
      # the defaults here never mask a genuinely missing secret at
      # runtime. The backup-runner's `schedule` subcommand
      # (src/server/backup-runner.ts) validates the same set via the
      # Zod schema and refuses to start on empties; the R2 HeadBucket
      # probe runs before any cron registers.
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_BUCKET: ${R2_BUCKET:-projekt-manager-backups}
      R2_REGION: ${R2_REGION:-auto}
      AGE_RECIPIENT: ${AGE_RECIPIENT:-}
      # Tmpfs path where the operator loads the age private identity
      # for Tier 2 drills (AC-168, AC-175). Default matches the tmpfs
      # mount above and the env schema default in
      # src/server/config/env.ts — kept explicit in compose so
      # check-env-drift.sh sees it and so the runner's Zod
      # schema cannot silently fall back to its default at runtime.
      AGE_IDENTITY_PATH: ${AGE_IDENTITY_PATH:-/run/drill-key/identity}
      # Container-local timezone. croner reads `timezone: 'Europe/Berlin'`
      # explicitly inside scheduleSubcommand (#199), so the schedule is
      # not load-bearing on this env var — it is informational for
      # `new Date().toLocaleString()` calls and for human-readable
      # `console.log` timestamps in `docker compose logs backup`.
      # node:22-alpine bundles full ICU + tzdata so no OS `tzdata`
      # package is required (was dropped from Dockerfile.backup with
      # the croner rearchitecture).
      TZ: Europe/Berlin
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    # No `ports:` — the backup service speaks only to `db` over the
    # internal compose network and to R2 outbound. No inbound surface
    # from anywhere.
    restart: unless-stopped
    logging: *default-logging
    profiles:
      # Omitted from a bare `docker compose up` so local dev doesn't
      # spin up a cron loop with empty R2 creds. Production deploy
      # opts in via `--profile backup` (scripts/deploy.sh sets this);
      # the runbook references the same profile.
      - backup

  caddy:
    build: ./docker/caddy
    mem_limit: 128m
    # SECURITY: Caddy's :443 listener is published only on the WireGuard
    # interface IP. WG_BIND_IP must be set to the wg0 address (e.g.
    # 10.213.17.1) in production. If unset, defaults to 127.0.0.1 (loopback
    # only) — safe for local dev where Caddy must not be reachable from any
    # external interface. Do NOT change this to 0.0.0.0 without also
    # opening the Hetzner firewall, which defeats the VPN-first principle.
    # See ADR-0008 §Network topology.
    ports:
      - '${WG_BIND_IP:-127.0.0.1}:443:443'
    volumes:
      # Long-form bind with `create_host_path: false` — see the
      # rationale on the same pattern in docker-compose.dev.yml's
      # `db.volumes`. Caddy is gated off in dev (profile: production),
      # so this guard mostly protects production deploys where a
      # missing Caddyfile must fail loudly rather than silently
      # materialise as a root-owned empty directory.
      - type: bind
        source: ./Caddyfile
        target: /etc/caddy/Caddyfile
        read_only: true
        bind:
          create_host_path: false
      - caddy_data:/data
      - caddy_config:/config
    environment:
      # DOMAIN is `:?`-gated here at its first (and only) reference in
      # the base file — the iter-9 storage refactor removed the former
      # `https://storage.${DOMAIN}` derivation in the app service, so
      # caddy is now the sole consumer. `:?` makes compose refuse to
      # parse without DOMAIN rather than substituting empty and handing
      # Caddy a broken site address. The HTTP-only overlay
      # (docker-compose.http.yml) overrides this entry with a literal
      # empty string after the base file has parsed; `.env.example` ships
      # `DOMAIN=localhost` so that path keeps working.
      DOMAIN: ${DOMAIN:?DOMAIN must be set}
      # `?` (no colon) — must be DECLARED but may be empty. Local dev
      # and the HTTP-only overlay leave it empty because Caddy is
      # profile-gated off there (docker-compose.dev.yml). Production
      # supplies the value via `secrets.env.age`; `secrets.manifest.txt`
      # + deploy-time pre-flight catch the missing-key case there.
      # `:?` (abort on empty) would wrongly fire in local dev where
      # `.env` has `CLOUDFLARE_API_TOKEN=` intentionally.
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN?CLOUDFLARE_API_TOKEN must be declared}
    depends_on:
      - app
    restart: unless-stopped
    logging: *default-logging

volumes:
  pgdata:
  caddy_data:
  caddy_config:
