# Development overlay — exposes DB and MinIO ports directly, no Caddy.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d db storage storage-init
#
# `storage-init` is a one-shot container that creates the MinIO bucket on
# first start; without it the storage tests fail with NoSuchBucket. It exits
# after the bucket is created.

services:
  app:
    # Build from source in dev instead of pulling the prod image
    # from GHCR (see ADR-0011). Compose merges this with the base
    # file, so the `image:` tag from docker-compose.yml becomes the
    # local build's output name — harmless, since the tag stays on
    # the developer's machine. The base `image:` references
    # `${APP_IMAGE_TAG}` with a `:?` gate; compose substitutes
    # per-file BEFORE merge, so .env.example pins a dev placeholder
    # to unblock local `up` without weakening the prod gate.
    build: .
    ports:
      - "${PORT:-3000}:3000"

  db:
    ports:
      - "5432:5432"
    volumes:
      - ./docker/init-test-db.sql:/docker-entrypoint-initdb.d/create-test-db.sql:ro

  storage:
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO console
    environment:
      # Override the prod-shaped `https://${DOMAIN}` from docker-compose.yml.
      # Browsers running against the Vite dev server come from
      # http://localhost:5173 (and variants on the host's network/WireGuard
      # interfaces), which never matches the prod origin — so MinIO omits
      # CORS headers on the preflight, the browser blocks the presigned
      # POST, and uploads appear as "Änderung fehlgeschlagen" in the UI
      # while the object has already landed in the bucket (orphan). `*` is
      # safe here because presigned POSTs don't carry credentials (auth is
      # in the form fields), and dev storage holds no real data. Prod stays
      # strict via docker-compose.yml.
      MINIO_API_CORS_ALLOW_ORIGIN: "*"

  caddy:
    # Caddy requires CLOUDFLARE_API_TOKEN for DNS-01 TLS — not available
    # in dev. Gate it behind a profile so it never starts when the dev
    # overlay is active. Production uses docker-compose.yml alone (no
    # overlay), so Caddy starts normally there.
    profiles:
      - production
