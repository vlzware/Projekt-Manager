# Development overlay — exposes service ports directly, builds the app
# image from source, and gates Caddy off (no DNS-01 token in dev).
#
# The MinIO mirror that stands in for B2 in dev lives in its own file
# (`docker-compose.minio.yml`) so the CI smoke test can attach the same
# MinIO surface to the prod GHCR image without picking up the dev
# `build: .` override.
#
# `.env.example` declares COMPOSE_FILE for the dev overlay triple, so a
# bare `docker compose up -d` in this repo merges all three files
# automatically. Equivalent explicit form:
#
#   docker compose -f docker-compose.yml -f docker-compose.minio.yml \
#                  -f docker-compose.dev.yml up -d

services:
  app:
    # Build from source in dev instead of pulling the prod image
    # from GHCR (see ADR-0011). Compose merges this with the base
    # file, so the `image:` tag from docker-compose.yml becomes the
    # local build's output name — harmless, since the tag stays on
    # the developer's machine. The base `image:` references
    # `${APP_IMAGE_TAG}` with a `:?` gate; compose substitutes
    # per-file BEFORE merge, so .env.example pins a dev placeholder
    # to unblock local `up` without weakening the prod gate.
    build: .
    ports:
      - "${PORT:-3000}:3000"
    # Profile-gated off the default dev workflow. Local dev runs the
    # app via `npm run dev` on the host (HMR, faster reload, no image
    # rebuild per change), so a containerised app would be a duplicate
    # listener on :3000. Opt in explicitly with
    # `docker compose --profile containerised-app up -d` when
    # exercising the prod-shaped Dockerfile build locally. CI smoke
    # uses the base file's GHCR `app` directly (no dev overlay) and
    # is unaffected.
    profiles:
      - containerised-app

  db:
    ports:
      - "5432:5432"
    volumes:
      # Long-form bind with `create_host_path: false`. The default
      # daemon behaviour is to silently materialise a missing bind-mount
      # source as a root-owned directory (dockerd runs as root, the
      # session as the dev user) — which is exactly how the worktree2
      # Claude session left an unremovable `init-test-db.sql/` directory
      # behind: the worktree files were rm'd while the compose stack was
      # still alive, dockerd re-created the missing source path on its
      # next mount touch, and the user couldn't clean it up without
      # sudo. `create_host_path: false` converts that silent footgun
      # into a loud "source does not exist" error at compose up time.
      - type: bind
        source: ./docker/init-test-db.sql
        target: /docker-entrypoint-initdb.d/create-test-db.sql
        read_only: true
        bind:
          create_host_path: false

  storage:
    # MinIO console (the S3 API port lives in docker-compose.minio.yml,
    # since both dev and CI smoke want it published). The console is a
    # developer convenience, not a CI need.
    ports:
      - "9001:9001"

  caddy:
    # Caddy requires CLOUDFLARE_API_TOKEN for DNS-01 TLS — not available
    # in dev. Gate it behind a profile so it never starts when the dev
    # overlay is active. Production uses docker-compose.yml alone (no
    # overlay), so Caddy starts normally there.
    profiles:
      - production
