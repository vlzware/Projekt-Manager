# HTTP-only evaluation mode. DO NOT use for real users or data.
# Usage: docker compose -f docker-compose.yml -f docker-compose.http.yml up -d
#
# Replaces the custom Caddy (Cloudflare DNS plugin) with stock Caddy on port 80.
# No domain, no TLS, no Cloudflare token, no WireGuard required.
# See docs/ops/http-only-evaluation.md.

services:
  caddy:
    image: caddy:2-alpine
    build: !reset null
    ports: !override
      - '0.0.0.0:80:80'
    volumes: !override
      # Long-form bind with `create_host_path: false` — see the
      # rationale on the same pattern in docker-compose.dev.yml's
      # `db.volumes`. Refuses to silently materialise a missing
      # Caddyfile.http as a root-owned empty directory.
      - type: bind
        source: ./Caddyfile.http
        target: /etc/caddy/Caddyfile
        read_only: true
        bind:
          create_host_path: false
    environment:
      DOMAIN: ''
      CLOUDFLARE_API_TOKEN: ''

  app:
    build: .
    environment:
      NODE_ENV: development
      ALLOW_INSECURE_HTTP: 'true'
