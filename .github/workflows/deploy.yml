name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main, 'iteration/**']

# Only one deploy at a time; cancel in-progress if a new push arrives.
concurrency:
  group: deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only deploy if CI succeeded.
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -euo pipefail
            cd /opt/projekt-manager
            git fetch origin
            git checkout ${{ github.event.workflow_run.head_sha }}
            # Assert the checkout landed on the expected SHA. Without this,
            # a silently-failed checkout (e.g. uncommitted local changes
            # blocking the switch) would continue past with a stale working
            # tree and deploy the wrong code — the exact failure mode
            # hit in iteration 4. See #48 comment 2026-04-08.
            actual=$(git rev-parse HEAD)
            expected="${{ github.event.workflow_run.head_sha }}"
            if [ "$actual" != "$expected" ]; then
              echo "::error::git checkout landed at $actual, expected $expected"
              exit 1
            fi
            docker compose build app
            docker compose up -d

      - name: Smoke test
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -euo pipefail
            cd /opt/projekt-manager
            timeout=60
            elapsed=0
            # Probe the app container's health endpoint directly, bypassing
            # Caddy. Verifies app+db+storage are healthy without depending on
            # the TLS / VPN bind path. The TLS chain is verified separately
            # via a tailnet probe (see docs/ops/cd-pipeline.md).
            until docker compose exec -T app node -e "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))" 2>/dev/null; do
              sleep 2
              elapsed=$((elapsed + 2))
              if [ "$elapsed" -ge "$timeout" ]; then
                echo "Health check failed after ${timeout}s"
                docker compose logs --tail=50
                exit 1
              fi
            done
            echo "Deploy verified — healthy at $(git rev-parse --short HEAD)"
