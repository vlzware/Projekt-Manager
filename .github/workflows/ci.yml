name: CI

on:
  push:
    branches: [main, 'iteration/**']
  pull_request:
    branches: [main, 'iteration/**']

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Unit and component tests
        run: npm run test:coverage

      - name: Build
        run: npm run build
