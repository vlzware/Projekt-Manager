name: CI

on:
  push:
    branches: [main, 'iteration/**']
  pull_request:
    branches: [main, 'iteration/**']
  # Manual escape hatch for building/publishing images on a feature
  # branch so it can be deployed to the VPS via scripts/deploy.sh
  # without first merging to main. CLI-only by design — the GH UI
  # "Run workflow" button only surfaces workflows from the default
  # branch, so for now invoke as:
  #   gh workflow run ci.yml --ref <branch>
  # Mirrors the same pattern used by .github/workflows/e2e.yml.
  workflow_dispatch:

# Dedup overlapping runs on the same branch. Without this, a push to a
# feature branch with an open PR fires `pull_request` (runs `check`),
# and a follow-up `gh workflow run` fires `workflow_dispatch` (runs
# `check` AND `build-and-push`) — paying for `check` twice. The group
# key normalises across event types: `pull_request.head.ref` is the
# source branch on PR events, `ref_name` is the short branch name on
# push/dispatch — both resolve to the same string for the same branch,
# so the second run cancels the first. Branch protection looks up
# `check` by name + commit SHA; the surviving run produces the same
# named status, so PR mergeability is preserved.
concurrency:
  group: ci-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          # POSTGRES_DB defaults to POSTGRES_USER, so omitting it yields
          # a `pm` database. Vitest integration tests don't use it
          # directly — `src/test/integration-setup.ts` creates per-fork
          # `projekt_manager_test_<pid>` databases on demand from the
          # `pm` superuser. The base DB only needs to be reachable for
          # connection-string parsing and pool warm-up.
          POSTGRES_USER: pm
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pm -d pm"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      # ripgrep — needed by scripts/check-theme-tokens.sh; without it
      # the check silently no-ops. age — needed by src/test/integration-
      # setup.ts, which generates a per-fork binary identity via
      # `age-keygen` before vitest's integration suite runs (ADR-0024).
      # Neither is preinstalled on ubuntu-latest.
      - name: Install apt prerequisites
        run: sudo apt-get update && sudo apt-get install -y ripgrep age

      # Allowlist schema gate (ADR-0027 §Negative; runbook §Allowlist).
      # Scanners enforce only the advisory ID; owner/reason/expiry are
      # convention. This gate makes the convention machine-enforced so a
      # sloppy entry cannot land. ~100ms; runs before OSV-Scanner so the
      # cheap check fails fast.
      - name: Check allowlist schema (osv-scanner.toml + .trivyignore)
        run: bash scripts/check-allowlist-schema.sh

      - name: Check allowlist schema — self-test
        run: bash scripts/__tests__/check-allowlist-schema.test.sh

      # OSV-Scanner (ADR-0027 §Decision.2) — replaces `npm audit`. OSV.dev
      # ingests GHSA, so OSV is a strict superset of npm audit for npm
      # advisories AND covers transitive OS-level CVEs the registry index
      # does not surface. Inline-in-the-`check`-job CLI install instead of
      # google/osv-scanner-action because that action only ships reusable
      # workflows (separate jobs) and a composite Docker action documented
      # as "not intended to be used directly" — neither fits an inline step.
      # Binary pinned by SHA256 from the official v2.3.8 release.
      #
      # Scans the lockfile only (PR-time gate). Full-tree scheduled scan
      # lives in .github/workflows/security-scheduled.yml.
      # Allowlist: osv-scanner.toml (empty baseline; entries require owner +
      # reason + ignoreUntil ≤90d per ADR-0027 §Negative).
      - name: Install OSV-Scanner CLI
        run: |
          set -euo pipefail
          url="https://github.com/google/osv-scanner/releases/download/v2.3.8/osv-scanner_linux_amd64"
          expected_sha="bc98e15319ed0d515e3f9235287ba53cdc5535d576d24fd573978ecfe9ab92dc"
          curl -fsSL -o /tmp/osv-scanner "$url"
          actual_sha=$(sha256sum /tmp/osv-scanner | awk '{print $1}')
          if [ "$actual_sha" != "$expected_sha" ]; then
            echo "::error::OSV-Scanner binary SHA256 mismatch — expected $expected_sha got $actual_sha"
            exit 1
          fi
          chmod +x /tmp/osv-scanner
          sudo mv /tmp/osv-scanner /usr/local/bin/osv-scanner
          osv-scanner --version

      - name: OSV-Scanner (lockfile, fail on any vuln)
        # `scan source` is the subcommand for source-tree scans (lockfiles,
        # SBOMs, manifests). --lockfile pins the input to package-lock.json.
        # --config points at the repo allowlist. Default exit code on
        # vuln-found is non-zero, which fails the step and blocks the PR.
        #
        # NOTE on severity: osv-scanner v2.3.8 has no --severity flag. The
        # gate fails on ANY vuln OSV.dev knows about, regardless of CVSS.
        # This is stricter than ADR-0027's original "HIGH/CRITICAL" wording
        # and aligns with the project's "refuse-or-block, never downgrade"
        # principle (CLAUDE.md). False positives go through
        # osv-scanner.toml with the documented owner/reason/expiry schema.
        run: osv-scanner scan source --lockfile=./package-lock.json --config=./osv-scanner.toml

      # Trivy source-tree scans land in `check` (not in `docker`) so they
      # run on every PR regardless of which paths changed. The `docker`
      # job below is path-filtered and pull-request-only — leaving secret
      # + IaC scans there would skip them on every TS-only / docs / e2e
      # PR (the majority class), making the gate informational rather
      # than blocking. Branch protection requires `check`; `docker`
      # provides only the image-vuln scan + compose validation.
      #
      # Allowlist: .trivyignore (entries gated by check-allowlist-schema
      # above; empty baseline).
      - name: Trivy — filesystem secret scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret
          # No `severity:` filter — Trivy classifies many real secret
          # rules as MEDIUM (JWTs, age private keys per ADR-0024, Slack
          # webhooks). Filtering to HIGH/CRITICAL silently drops them.
          # Any committed secret is a finding, full stop.
          exit-code: '1'
          trivyignores: .trivyignore

      - name: Trivy — IaC misconfig scan (HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          # IaC has the noisiest baseline of the three Trivy scans —
          # the HIGH/CRITICAL filter keeps the signal-to-noise workable.
          severity: HIGH,CRITICAL
          exit-code: '1'
          trivyignores: .trivyignore

      - name: Lint
        run: npm run lint

      # H5 audit finding: every .sh under scripts/ goes through shellcheck
      # at `--severity=warning`. Covers scripts/*.sh (rotation/deploy
      # toolchain) and scripts/backup/*.sh (cron entrypoints + drill
      # loader). Action pinned by SHA to match the rest of this workflow.
      - name: Shellcheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # v2.0.0
        env:
          SHELLCHECK_OPTS: --severity=warning
        with:
          scandir: ./scripts

      - name: Format check
        run: npm run format:check

      # Enforce AC-108 — palette and semantic tokens live in a single source
      # (src/styles/tokens.css); state colors from stateConfig.ts are the one
      # documented exception. Runs before type-check so a token leak fails
      # fast and is not hidden behind a tsc error elsewhere.
      - name: Check theme token hygiene
        run: npm run check:tokens

      - name: Type check
        run: npx tsc --noEmit

      # Static check: every var declared in src/server/config/env.ts must
      # be forwarded to the app container via docker-compose.yml's
      # services.app.environment. Regression guard for the #57 failure
      # mode where BOOTSTRAP_ADMIN_* landed in the Zod schema but were
      # forgotten in compose, silently stripping them from the container
      # env at runtime.
      - name: Env drift check (env.ts ↔ docker-compose.yml)
        run: bash scripts/check-env-drift.sh

      # Static check: every raw INSERT/UPDATE/DELETE on an audited
      # table (project, customer, user, project_worker) must be
      # authored inside the service-layer `mutate()` helper or on the
      # reviewed allowlist (migrations, ImportService, seed loaders,
      # retention cleanup, __tests__). See AC-179 and ADR-0021.
      - name: Audit single-write-path check (mutate() bypass)
        run: bash scripts/check-audit-mutations.sh

      # MinIO runs as a step (not a service container) because GitHub service
      # containers do not support overriding `command`, and minio/minio needs
      # `server /data` as its argv. Versions are pinned to match
      # docker-compose.yml (ADR-0009 — version pinning across environments).
      #
      # Bucket provisioning is delegated to docker/init-storage.sh so the dev
      # compose recipe and CI stay in lockstep — versioning, Compliance
      # Object Lock, lifecycle, AND a capability-restricted MinIO app user
      # (#45 / ADR-0022). The boot-time bucket-safety probe in
      # src/server/storage/safety.ts plus the integration arm of
      # src/server/__tests__/storage-safety.test.ts both run end-to-end
      # against this MinIO; without the full provisioning the probe
      # correctly fail-closes and CI stops before any test executes.
      #
      # The script hardcodes `http://storage:9000` as its mc alias target
      # (the compose service hostname). To reuse the script unchanged, MinIO
      # is named `storage` and attached to a user-defined bridge network
      # alongside the mc one-shot — Docker auto-creates DNS entries for
      # container names on user-defined networks. Port 9000 is still
      # published to the runner so vitest (running on the host) reaches
      # MinIO at http://localhost:9000.
      - name: Start MinIO
        env:
          # Root creds run the MinIO process and are used by the init script
          # for admin operations only — the app NEVER runs as root. Hardcoded
          # ephemeral test values; no secret material.
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: changeme
          # Capability-restricted app user (#45 / ADR-0022). The init script
          # provisions this user with a bucket-scoped policy that allows
          # write/read/list/hide but denies s3:DeleteObjectVersion. The
          # boot-time capability self-test (and the integration arm of
          # storage-safety.test.ts) asserts this credential cannot destroy
          # versions, so vitest must run with these creds, not the root ones.
          MINIO_APP_ACCESS_KEY: pmappci
          MINIO_APP_SECRET_KEY: pmappcisecret
          STORAGE_BUCKET: projekt-manager
          # Isolated bucket the vitest integration suite targets via
          # src/test/integration-setup.ts. Provisioned alongside
          # STORAGE_BUCKET by docker/init-storage.sh below; the app user's
          # IAM policy gains the matching ARN so the boot-time bucket-
          # safety probe (which runs against the test bucket once the
          # suite overrides STORAGE_BUCKET) doesn't fail-close with
          # AccessDenied. Mirrors STORAGE_BUCKET_E2E in e2e.yml.
          STORAGE_BUCKET_TEST: projekt-manager-test
        run: |
          docker network create pm-storage-net
          docker run -d --name storage \
            --network pm-storage-net \
            -p 9000:9000 \
            -e MINIO_ROOT_USER \
            -e MINIO_ROOT_PASSWORD \
            minio/minio:RELEASE.2025-09-07T16-13-09Z \
            server /data
          # Wait for MinIO to become ready (max 30s).
          for i in {1..30}; do
            if curl -sf http://localhost:9000/minio/health/live > /dev/null; then
              echo "MinIO ready after ${i}s"
              break
            fi
            sleep 1
          done
          # Provision the bucket and the capability-restricted app user via
          # the same script the dev compose stack runs. Mounted read-only;
          # the script itself is idempotent. Network-attached so the
          # script's `mc alias set minio http://storage:9000 ...` resolves.
          docker run --rm --network pm-storage-net \
            -v "$PWD/docker/init-storage.sh:/init-storage.sh:ro" \
            -e MINIO_ROOT_USER \
            -e MINIO_ROOT_PASSWORD \
            -e MINIO_APP_ACCESS_KEY \
            -e MINIO_APP_SECRET_KEY \
            -e STORAGE_BUCKET \
            -e STORAGE_BUCKET_TEST \
            --entrypoint /bin/sh \
            minio/mc:RELEASE.2025-08-13T08-35-41Z \
            /init-storage.sh

      - name: Unit and component tests
        run: npm run test:coverage
        env:
          DATABASE_URL: postgresql://pm:postgres@localhost:5432/pm
          # Storage env vars are required by src/server/__tests__/storage.test.ts
          # which fails loud if any is missing (no silent skips — see file
          # header in storage.test.ts). The integration arm of
          # storage-safety.test.ts additionally requires these to be the
          # capability-restricted app user (not root) — the boot probe
          # asserts the running credential cannot destroy versions.
          STORAGE_ENDPOINT: http://localhost:9000
          STORAGE_BUCKET: projekt-manager
          # Isolated bucket the integration suite re-points STORAGE_BUCKET
          # at (src/test/integration-setup.ts §3). Set explicitly here —
          # matching the docker-compose.minio.yml default — so the bucket
          # name flows through one source of truth instead of relying on
          # the hardcoded fallback in integration-setup.ts.
          STORAGE_BUCKET_TEST: projekt-manager-test
          STORAGE_ACCESS_KEY: pmappci
          STORAGE_SECRET_KEY: pmappcisecret
          # MinIO accepts any region; us-east-1 is the SDK default.
          STORAGE_REGION: us-east-1

      - name: Build
        run: npm run build

  # ---------------------------------------------------------------
  # Detect whether container-relevant files changed in this PR/push.
  # Gates the `docker` job so we do not pay the image-build cost on
  # every commit — most PRs do not touch Docker files at all.
  # ---------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    # dorny/paths-filter calls the Pulls API to list changed files on
    # pull_request events. The default GITHUB_TOKEN in this repo does
    # not grant `pull-requests: read`, which surfaces as "Resource not
    # accessible by integration". Grant it explicitly for this job
    # only — `contents: read` stays as the default for everything else.
    permissions:
      contents: read
      pull-requests: read
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            docker:
              - 'Dockerfile'
              - '.dockerignore'
              - 'docker/**'
              - 'docker-compose.yml'
              - 'docker-compose.*.yml'
              - 'package.json'
              - 'package-lock.json'
              # Self-validation: changes to this workflow (the docker
              # job itself, the drift check, or the cache config) must
              # exercise the docker job once so regressions are caught
              # on the PR that introduces them, not on the next
              # Docker-touching PR.
              - '.github/workflows/ci.yml'

  # ---------------------------------------------------------------
  # Docker validation — only runs when container-relevant files
  # changed, and only on pull requests. On push (merge) events the
  # `build-and-push` job below does the same build for real (and
  # actually publishes), so running both would just double-build
  # the same layers. See ADR-0011 for the split rationale.
  # ---------------------------------------------------------------
  docker:
    needs: changes
    if: needs.changes.outputs.docker == 'true' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # `docker compose config --quiet` exits 0 even when a
      # referenced `${VAR}` has no default — it only prints a stderr
      # warning. Capture combined output and fail on
      # "variable is not set" so a newly-referenced `${FOO}` without
      # a `:-` default cannot sail through CI. Carried over from the
      # closed PR #67.
      - name: Validate Compose file references
        env:
          # Placeholders for variables in docker-compose.yml that have
          # no `:-` default. Kept intentionally minimal so adding a new
          # defaultless `${FOO}` trips the "variable is not set" grep
          # below — the whole point of this check. Do NOT add a
          # placeholder here "just in case": if a variable has a `:-`
          # default, leave it out so the check can still catch a
          # future removal of that default.
          POSTGRES_PASSWORD: placeholder
          # Object-storage env, all `:?`-gated in the base file because
          # values are operator-supplied per provider (B2 in prod, the
          # in-compose MinIO mirror in dev). Real deploys source them
          # from `.env` (operator config) and `secrets.env.age` (the
          # secret half).
          STORAGE_ENDPOINT: http://placeholder:9000
          STORAGE_REGION: us-east-1
          STORAGE_BUCKET: placeholder
          STORAGE_ACCESS_KEY: placeholder
          STORAGE_SECRET_KEY: placeholder
          # MinIO root + restricted-app credentials — only consumed by
          # the minio overlay. `:?`-gated there for the same operator-
          # must-supply reason.
          MINIO_ROOT_USER: placeholder
          MINIO_ROOT_PASSWORD: placeholder
          MINIO_APP_ACCESS_KEY: placeholder
          MINIO_APP_SECRET_KEY: placeholder
          CLOUDFLARE_API_TOKEN: placeholder
          # APP_IMAGE_TAG is `:?`-gated — mutable branch tag defaults
          # were removed. A placeholder lets `docker compose config`
          # parse; real deploys pass a SHA tag via scripts/deploy.sh.
          APP_IMAGE_TAG: placeholder
          # DOMAIN is `:?`-gated at the first reference in the caddy
          # service. Real deploys supply it via `.env`; CI needs any
          # non-empty value so compose can parse.
          DOMAIN: placeholder
        run: |
          set -euo pipefail
          check() {
            local label=$1
            shift
            local out
            if ! out=$(docker compose "$@" config --quiet 2>&1); then
              echo "::error::$label: docker compose config failed"
              echo "$out"
              exit 1
            fi
            if echo "$out" | grep -q 'variable is not set'; then
              echo "::error::$label: compose references an unset variable without a default"
              echo "$out" | grep 'variable is not set'
              exit 1
            fi
          }
          check "prod compose" -f docker-compose.yml
          check "prod + minio overlay" -f docker-compose.yml -f docker-compose.minio.yml
          check "prod + minio + dev overlays" -f docker-compose.yml -f docker-compose.minio.yml -f docker-compose.dev.yml
          # Exercise the backup profile once so variable substitution
          # inside the backup service's environment block is covered.
          check "prod compose, backup profile" -f docker-compose.yml --profile backup
          echo "Compose files validated."

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      # Build the production app image with layer caching. Caddy
      # has its own build context (./docker/caddy) with a custom
      # xcaddy + pinned plugin SHA that adds ~60s of Go compile and
      # rarely changes — documented accepted gap. If a Caddy build
      # regression slips through, the deploy workflow's image build
      # on the VPS is the backstop.
      - name: Build app image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile
          push: false
          # `load: true` exports the built image into the runner's local
          # Docker daemon (instead of leaving it only in the buildx
          # cache). Trivy's image scan below resolves `image-ref` via the
          # local daemon, so it must be loaded. Mutually exclusive with
          # multi-platform builds, but this build is amd64-only.
          load: true
          tags: projekt-manager-app:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Trivy image-vuln scan against the locally-built image
      # (ADR-0027 §Decision.2). Filesystem-secret + IaC scans live in
      # the `check` job above so they run on every PR; this job is
      # path-filtered and would skip them on the majority of PRs.
      # Allowlist: .trivyignore (entries gated by the schema check in
      # `check`; empty baseline). HIGH/CRITICAL only — image scans
      # otherwise drown in LOW-severity OS-package noise.
      #
      # No `ignore-unfixed`: per the project's refuse-or-block-never-
      # downgrade principle, a no-fix-yet CVE is still a finding. If
      # one becomes operationally tolerable, the entry goes in
      # .trivyignore with owner/reason/exp ≤90d — same machinery as
      # the rest of the allowlist.
      - name: Trivy — image vuln scan (HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: projekt-manager-app:ci
          severity: HIGH,CRITICAL
          exit-code: '1'
          trivyignores: .trivyignore

  # ---------------------------------------------------------------
  # Build and push the production app image to GHCR on every push
  # to main/iteration branches. See ADR-0011 for the rationale
  # (short version: 2 vCPU / 4 GB VPS cannot host both the running
  # stack and a build peak without risking OOM during deploys).
  #
  # Runs on every push regardless of which files changed — a pure
  # TypeScript commit still changes the image because `COPY . .`
  # bakes `src/**` in, so path-filtering would silently ship stale
  # images. GHA layer cache keeps no-op commits in the ~10-15s
  # range.
  #
  # Gated on `check` so we never publish an image from a commit
  # that fails tests, lint, or type-check.
  # ---------------------------------------------------------------
  build-and-push:
    # `push` covers main/iteration auto-builds (the original gate);
    # `workflow_dispatch` covers operator-triggered feature-branch
    # builds for VPS testing (see the trigger block above).
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Compute both tags we want to push in one place so the diff
      # is obvious if we ever change the scheme. The SHA tag is the
      # immutable rollback target used by scripts/deploy.sh; the
      # branch-slug tag is the moving "latest on this branch"
      # pointer kept as a human-friendly fallback (scripts/deploy.sh
      # always resolves to a SHA, so it is not on the hot path).
      # See ADR-0012 for the manual pull-based deploy flow.
      - name: Compute image tags
        id: tags
        run: |
          set -euo pipefail
          sha_tag="sha-${GITHUB_SHA}"
          # Slugify the branch name for Docker tag legality:
          # lowercase, replace '/' with '-', strip anything not in
          # [a-z0-9._-].
          branch_slug=$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]/' '[:lower:]-' | sed 's/[^a-z0-9._-]/-/g')
          owner="${GITHUB_REPOSITORY_OWNER}"
          {
            # App image tags.
            echo "app_tags<<APP_TAGS_EOF"
            echo "ghcr.io/${owner}/projekt-manager:${sha_tag}"
            echo "ghcr.io/${owner}/projekt-manager:${branch_slug}"
            echo "APP_TAGS_EOF"
            # Backup image tags — parallel scheme, same SHA + slug.
            echo "backup_tags<<BACKUP_TAGS_EOF"
            echo "ghcr.io/${owner}/projekt-manager-backup:${sha_tag}"
            echo "ghcr.io/${owner}/projekt-manager-backup:${branch_slug}"
            echo "BACKUP_TAGS_EOF"
            # Expose the slug-tag so the backup build step can pass it
            # to Dockerfile.backup's APP_IMAGE_TAG build-arg: the
            # backup image's FROM line pulls from the app tag we just
            # pushed in this same workflow run, so they must agree.
            echo "app_image_tag=${sha_tag}"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      # Build → scan → push. Two build-push-action invocations share
      # the gha cache, so the second one re-uses every layer and adds
      # ~5s. The split exists to keep a failing image scan from
      # publishing the bad tag to GHCR — `scripts/deploy.sh <sha>`
      # resolves images by SHA tag, so a published-then-fails-scan
      # sequence would leave a draw-able bad image behind.
      - name: Build app image (load locally for scan)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: projekt-manager-app:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Backstop Trivy image scan on the locally-loaded image before
      # publishing (ADR-0027 §Decision.2). The PR-time `docker` job
      # already scans the image before merge; this catches edge cases
      # — TS-only commits that change the baked-in code without
      # tripping the docker job's path filter, workflow_dispatch
      # builds on feature branches, and direct-push-to-main bypasses
      # that skipped the PR flow entirely. No `ignore-unfixed`: same
      # rationale as the `docker` job's scan.
      - name: Trivy — image vuln scan (HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: projekt-manager-app:ci
          severity: HIGH,CRITICAL
          exit-code: '1'
          trivyignores: .trivyignore

      - name: Push app image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.app_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Backup image — see ADR-0020 §Decision (Layer 2 encrypted
      # backups) and Dockerfile.backup. Built and pushed to GHCR under
      # the same tagging scheme as the app image so scripts/deploy.sh
      # can resolve both images by the same commit SHA. Sequential on
      # purpose: Dockerfile.backup's `FROM ghcr.io/...:${APP_IMAGE_TAG}`
      # references the just-pushed app image, so the app push must
      # complete first. Separate gha cache scope keeps the backup
      # image's layer cache from invalidating the app image's cache.
      - name: Build and push backup image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile.backup
          push: true
          tags: ${{ steps.tags.outputs.backup_tags }}
          build-args: |
            APP_IMAGE_TAG=${{ steps.tags.outputs.app_image_tag }}
          cache-from: type=gha,scope=backup
          cache-to: type=gha,mode=max,scope=backup

      # `age` on the runner is needed by the smoke step below to mint a
      # per-run binary `age` keypair before `docker compose up`. The app
      # boot probe (assertBinaryIdentityLoaded — ADR-0024) refuses to
      # start without a tmpfs-loaded identity matching
      # BINARY_AGE_RECIPIENT; the recipient is interpolated into the app
      # container's env at compose-parse time, so it must exist before
      # the stack comes up. Same install as the `check` job.
      - name: Install age (smoke prerequisite)
        run: sudo apt-get update && sudo apt-get install -y age

      # ---------------------------------------------------------------
      # Runtime smoke test — catch bugs that "does it compile?" misses.
      #
      # History (pre-#199): iteration 7 landed with six distinct
      # runtime defects that all passed `npm ci && npm test && docker
      # build`. Each one fired only when the container actually booted
      # and ran its real code path on a real DB:
      #   - dcron EPERM on setpgid (needed init:true) — gone with #199
      #     (croner does not fork; container runs non-root)
      #   - shared env schema required STORAGE_* (unused by backup-runner)
      #   - listen_addresses='' literal quotes in execve
      #   - pg Pool defaulting to a role that doesn't exist
      #   - /var/run tmpfs shadowing /run/drill-key
      #   - seed fixture readFileSync at module load (since fixed to an
      #     inlined JSON import so the specific ENOENT can't recur)
      #
      # Cheap defence: boot the full stack with the in-stack MinIO
      # standing in as the R2 target. Confirm the scheduler logged
      # its registered-jobs lines (catches a schedule-registration
      # regression in scheduleSubcommand), then run one `node
      # backup-runner.js run` cycle end to end. MinIO is S3-compatible
      # for every call the uploader makes (HeadBucket / PutObject /
      # GetObject / ListObjectsV2), so this exercises the real
      # pipeline including the startup R2 HeadBucket probe and the
      # ephemeral-pg spawn under the postgres UID. An env-schema
      # error, spawn-quoting crash, peer-auth failure, missing
      # binary, or schedule-registration regression all surface here
      # before the image is picked up by a real deploy. Runtime cost
      # is ~60–90s on GHA's hosted runners.
      # ---------------------------------------------------------------
      - name: Runtime smoke test
        env:
          # `build-and-push` already pushed both images under the SHA
          # tag; the smoke step pulls them back through docker compose's
          # normal path so the compose config is exercised too, not just
          # the images.
          APP_IMAGE_TAG: ${{ steps.tags.outputs.app_image_tag }}
          # Placeholder secrets — the stack must start and one
          # `node backup-runner.js run` cycle must complete before any
          # of these matter to anything outside the compose network.
          POSTGRES_PASSWORD: smoke
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: smoke123
          # Capability-restricted MinIO app user (#45 / ADR-0022) —
          # `:?`-gated in the minio overlay because the app must NEVER
          # run as root. storage-init provisions this user.
          MINIO_APP_ACCESS_KEY: pmappsmoke
          MINIO_APP_SECRET_KEY: pmappsmokesecret
          # Object-storage env consumed by the app. The minio overlay
          # overrides STORAGE_ENDPOINT / STORAGE_PUBLIC_ENDPOINT /
          # STORAGE_REGION for the in-compose target; the base file's
          # `:?` gates need values at parse time so we set them too.
          # STORAGE_ACCESS_KEY / STORAGE_SECRET_KEY mirror MINIO_APP_*
          # (the user the app actually runs as).
          STORAGE_ENDPOINT: http://storage:9000
          STORAGE_REGION: us-east-1
          STORAGE_BUCKET: projekt-manager
          STORAGE_ACCESS_KEY: pmappsmoke
          STORAGE_SECRET_KEY: pmappsmokesecret
          CLOUDFLARE_API_TOKEN: smoke
          # R2 target points at the in-stack MinIO. The backup
          # container's schedule subcommand (backup-runner.ts) runs
          # an authenticated HeadBucket probe on startup and exits
          # non-zero on any failure — an unreachable endpoint or a
          # missing bucket would crash the container into a restart
          # loop before any tick could be exercised. A reachable,
          # authenticated target lets the probe, the schedule
          # registration, and the upload pipeline run end to end.
          R2_ACCESS_KEY_ID: minioadmin
          R2_SECRET_ACCESS_KEY: smoke123
          R2_ENDPOINT: http://storage:9000
          R2_BUCKET: projekt-manager-backup-smoke
          R2_REGION: auto
          # Throwaway age recipient — must be a real Bech32-valid key so
          # `age` accepts it during encrypt. The private half is discarded:
          # smoke only exercises the forward path (encrypt + upload), never
          # decryption, so nothing in the smoke can read what it wrote.
          AGE_RECIPIENT: age15nf2qq4znfwup9khgjk0rdgp5wg9vx33fngc727m3zdkctq29djqyr9su6
          # App-side env vars normally sourced from .env on the VPS.
          DOMAIN: smoke.invalid
          WG_BIND_IP: 127.0.0.1
          # COMPOSE_FILE makes every plain `docker compose` call below
          # implicitly load BOTH the prod base file AND the MinIO mirror
          # overlay. The base file alone has no `storage` / `storage-init`
          # services (prod talks to B2); the smoke test stands MinIO in
          # for B2. `:` is the file separator in COMPOSE_FILE on POSIX.
          COMPOSE_FILE: docker-compose.yml:docker-compose.minio.yml
        run: |
          set -euo pipefail
          cleanup() {
            echo "::group::Smoke teardown"
            docker compose --profile backup logs backup --tail=80 || true
            docker compose --profile backup logs app --tail=40 || true
            docker compose --profile backup down -v --remove-orphans || true
            echo "::endgroup::"
          }
          trap cleanup EXIT

          # Per-run binary `age` keypair (ADR-0024). The boot probe
          # (assertBinaryIdentityLoaded) refuses to start the app
          # without a tmpfs-loaded identity matching
          # BINARY_AGE_RECIPIENT, which compose interpolates into the
          # app container's env at parse time — so the recipient must
          # exist BEFORE `docker compose up`. Mirrors the per-fork
          # keypair pattern in src/test/integration-setup.ts and
          # playwright.config.ts; the private half is loaded into the
          # app's tmpfs further down (after compose up but before the
          # boot probe runs — see "Load binary identity" group).
          BINARY_IDENTITY=$(age-keygen 2>/dev/null)
          BINARY_RECIPIENT=$(printf '%s' "$BINARY_IDENTITY" | age-keygen -y)
          export BINARY_AGE_RECIPIENT="$BINARY_RECIPIENT"

          echo "::group::Compose up (app stack, no backup yet)"
          # Explicit service list — caddy is skipped because it tries
          # to provision a TLS cert against the fake DOMAIN/token and
          # would otherwise dominate the log with ACME retries. Backup
          # is deferred until the R2 bucket exists on MinIO, otherwise
          # the schedule subcommand's startup HeadBucket probe would
          # 404 and the container would restart-loop. COMPOSE_FILE in
          # env: above picks up the minio overlay automatically.
          docker compose up -d db storage storage-init app
          echo "::endgroup::"

          echo "::group::Load binary identity via load-binary-key (operator path)"
          # Invoke the actual operator script — not a tee bypass — so
          # regressions in the script's runtime environment (missing
          # bash, missing age-keygen, broken tmpfs-invariant check,
          # etc.) surface here instead of on first real deploy. The
          # script reads stdin via `read -r -s -d $'\004'`, which
          # accepts EOF as a terminator, so piping the identity works
          # without a literal Ctrl-D byte. No `-t` because GHA has no
          # TTY; `read -s` is a no-op on non-TTY stdin and the rest of
          # the script is TTY-agnostic.
          #
          # The probe sits behind ~5s of pre-probe boot work (migrate +
          # bootstrapAdminIfEmpty + validateWorkflowStates +
          # assertStorageBucketSafe), so a 1s polling exec lands
          # comfortably ahead. If the app already crashed once before
          # we land, the next restart re-creates the tmpfs (PID 1 exit
          # kills the namespace), so we keep retrying until the
          # loader script actually succeeds AND its write survives.
          loaded=0
          last_out=""
          for i in $(seq 1 30); do
            if last_out=$(printf '%s' "$BINARY_IDENTITY" | \
                          docker exec -i projekt-manager-app-1 \
                          load-binary-key 2>&1); then
              echo "  $last_out"
              echo "  loaded via load-binary-key (attempt $i)"
              loaded=1
              break
            fi
            sleep 1
          done
          if [ "$loaded" != "1" ]; then
            echo "::error::load-binary-key did not succeed within 30s"
            printf '%s\n' "$last_out" >&2
            exit 1
          fi
          echo "::endgroup::"

          echo "::group::Wait for app readiness (up to 90s)"
          # Single source of truth in scripts/smoke-app-health.sh — same
          # probe deploy and sync-restore use. Per-attempt failure reasons
          # (HTTP status+body, fetch error) print inline so a smoke that
          # fails because storage went down doesn't look identical to one
          # that fails because Fastify never bound :3000.
          if ! ./scripts/smoke-app-health.sh projekt-manager-app-1 90; then
            echo "::error::App did not become ready"
            exit 1
          fi
          echo "::endgroup::"

          echo "::group::Create R2 smoke bucket on MinIO"
          # One-off mc container attached to the compose network,
          # reusing the storage-init service definition so no network-
          # name lookup is needed. --no-deps skips depends_on resolution
          # (storage is already up); -T disables TTY for cleaner logs.
          docker compose run --rm --no-deps -T \
            --entrypoint /bin/sh \
            storage-init \
            -c "mc alias set local http://storage:9000 \"\$MINIO_ROOT_USER\" \"\$MINIO_ROOT_PASSWORD\" && mc mb --ignore-existing local/${R2_BUCKET}"
          echo "::endgroup::"

          echo "::group::Bring up backup container"
          docker compose --profile backup up -d backup
          echo "::endgroup::"

          echo "::group::Backup container stable? (up to 20s)"
          # Poll briefly so we don't race the startup R2 probe — the
          # probe runs early in scheduleSubcommand and the container
          # reports 'running' before the probe has had a chance to
          # crash it. A stable container in this window passed the
          # probe and registered the croner schedule.
          for i in $(seq 1 10); do
            running=$(docker inspect projekt-manager-backup-1 --format '{{.State.Running}}' 2>/dev/null || echo false)
            restarts=$(docker inspect projekt-manager-backup-1 --format '{{.RestartCount}}' 2>/dev/null || echo 0)
            echo "  attempt $i: running=$running restarts=$restarts"
            if [ "$running" = "true" ] && [ "$restarts" = "0" ]; then
              sleep 2
              continue
            fi
            break
          done
          if [ "$running" != "true" ] || [ "$restarts" -gt 0 ]; then
            echo "::error::Backup container is not healthy (running=$running restarts=$restarts)"
            exit 1
          fi
          echo "::endgroup::"

          echo "::group::Scheduler registered all four cron jobs?"
          # scheduleSubcommand logs one "registered <name> next=..." line
          # per croner job at boot. Confirming all four are present
          # catches a regression where a job's cron expression is
          # malformed (croner throws at construction → only the earlier
          # jobs ever registered), or where buildScheduleJobs returned
          # fewer than four entries. The unit tests in
          # backup-runner-schedule.test.ts cover the wiring at the
          # function level; this smoke proves the wiring survives an
          # actual container boot.
          backup_logs=$(docker logs projekt-manager-backup-1 2>&1)
          echo "$backup_logs"
          for name in backup-weekday backup-weekend drill-weekday drill-weekend; do
            if ! printf '%s' "$backup_logs" | grep -q "schedule: registered ${name} next="; then
              echo "::error::scheduler did not log a 'registered ${name}' line at boot"
              exit 1
            fi
          done
          echo "  all four croner jobs registered — smoke OK"
          echo "::endgroup::"

          echo "::group::Run one backup cycle"
          # Full pipeline: env parse, pg_dump, ephemeral-pg verify,
          # age encrypt, PutObject to MinIO. Expected rc=0 — MinIO
          # is S3-compatible for every call the uploader makes. A
          # non-zero rc here is a real runtime defect the image-build
          # phase did not catch.
          #
          # NOTE: this is a SEPARATE node process from the scheduler
          # in PID 1; the manual `run` subcommand is not serialised
          # against an in-flight scheduled tick (croner's protect: true
          # only covers intra-process). Acceptable here because the
          # smoke clock is unlikely to land on the schedule's tick
          # window during the ~5-min run.
          set +e
          backup_out=$(docker exec projekt-manager-backup-1 \
            node /app/dist/server/backup-runner.js run 2>&1)
          backup_rc=$?
          set -e
          echo "$backup_out"
          echo "  exit code: $backup_rc"
          if [ "$backup_rc" != "0" ]; then
            echo "::error::backup-runner run failed end-to-end against MinIO — see output above"
            exit 1
          fi
          echo "  backup-runner run completed end-to-end — smoke OK"
          echo "::endgroup::"

          echo "::group::Drill-key tmpfs reachable?"
          # Catches the /var/run tmpfs shadowing /run/drill-key bug by
          # confirming the script can at least reach the write path
          # (sends an empty paste — load-drill-key rejects with a
          # clear "empty input" message, which proves the tmpfs-invariant
          # check passed).
          set +e
          dk_out=$(echo | docker exec -i projekt-manager-backup-1 /usr/local/bin/load-drill-key 2>&1)
          dk_rc=$?
          set -e
          echo "$dk_out"
          if echo "$dk_out" | grep -q "not a tmpfs mount"; then
            echo "::error::load-drill-key reports /run/drill-key is not tmpfs — the /var/run tmpfs is shadowing it again"
            exit 1
          fi
          if echo "$dk_out" | grep -q "No such file or directory"; then
            echo "::error::load-drill-key cannot reach /run/drill-key/identity — mount topology regressed"
            exit 1
          fi
          echo "  drill-key tmpfs path is reachable — smoke OK"
          echo "::endgroup::"
