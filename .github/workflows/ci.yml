name: CI

on:
  push:
    branches: [main, 'iteration/**']
  pull_request:
    branches: [main, 'iteration/**']

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: projekt_manager_test
          POSTGRES_USER: pm
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pm -d projekt_manager_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - name: Audit dependencies
        run: |
          npm audit --audit-level=moderate && exit 0
          # If audit failed, check if only suppressed advisories remain.
          # See ADR-0007 for rationale.
          SUPPRESSED="GHSA-67mh-4wv8-2f99"
          UNKNOWN=$(npm audit --json | jq --arg s "$SUPPRESSED" \
            '[.vulnerabilities[].via[] | objects | .url] | map(select(contains($s) | not)) | length')
          if [ "$UNKNOWN" -gt 0 ]; then
            echo "::error::New vulnerabilities found beyond suppressed list"
            npm audit --audit-level=moderate
            exit 1
          fi
          echo "Only suppressed advisories found ($SUPPRESSED) — see ADR-0007"

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npx tsc --noEmit

      # Static check: every var declared in src/server/config/env.ts must
      # be forwarded to the app container via docker-compose.yml's
      # services.app.environment. Regression guard for the #57 failure
      # mode where BOOTSTRAP_ADMIN_* landed in the Zod schema but were
      # forgotten in compose, silently stripping them from the container
      # env at runtime.
      - name: Env drift check (env.ts ↔ docker-compose.yml)
        run: bash scripts/check-env-drift.sh

      # MinIO runs as a step (not a service container) because GitHub service
      # containers do not support overriding `command`, and minio/minio needs
      # `server /data` as its argv. Versions are pinned to match
      # docker-compose.yml (ADR-0009 — version pinning across environments).
      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=changeme \
            minio/minio:RELEASE.2025-09-07T16-13-09Z \
            server /data
          # Wait for MinIO to become ready (max 30s).
          for i in {1..30}; do
            if curl -sf http://localhost:9000/minio/health/live > /dev/null; then
              echo "MinIO ready after ${i}s"
              break
            fi
            sleep 1
          done
          # Create the test bucket. Uses mc with the same pinned version as
          # docker-compose.yml's storage-init sidecar.
          docker run --rm --network host \
            --entrypoint /bin/sh \
            minio/mc:RELEASE.2025-08-13T08-35-41Z \
            -c "mc alias set local http://localhost:9000 minioadmin changeme && mc mb --ignore-existing local/projekt-manager"

      - name: Unit and component tests
        run: npm run test:coverage
        env:
          DATABASE_URL: postgresql://pm:postgres@localhost:5432/projekt_manager_test
          # Storage env vars are required by src/server/__tests__/storage.test.ts
          # which fails loud if any is missing (no silent skips — see file
          # header in storage.test.ts).
          STORAGE_ENDPOINT: http://localhost:9000
          STORAGE_BUCKET: projekt-manager
          STORAGE_ACCESS_KEY: minioadmin
          STORAGE_SECRET_KEY: changeme

      - name: Build
        run: npm run build

  # Validate the Compose files and build the production app image on every
  # CI run. This job exists because the `check` job builds the JS but never
  # touches docker-compose.yml or the Dockerfile — a broken Compose file or
  # a Dockerfile regression only surfaces at deploy time on the VPS, where
  # the failure blocks main instead of the feature branch that introduced
  # it. Runs in parallel with `check` (no `needs:`) for fast feedback.
  # See #51.
  docker:
    runs-on: ubuntu-latest
    env:
      # Variables that appear in docker-compose.yml without a `:-` default.
      # Values are deliberately dummy — this job validates the Compose file
      # shape and the Dockerfile build, not runtime secrets. The set must
      # stay in sync with every `${VAR}` reference in docker-compose.yml and
      # docker-compose.dev.yml that has no `${VAR:-default}` fallback — the
      # config steps below fail explicitly if a new required variable is
      # added without being listed here.
      POSTGRES_PASSWORD: ci-dummy
      MINIO_ROOT_USER: ci-dummy
      MINIO_ROOT_PASSWORD: ci-dummy
      CLOUDFLARE_API_TOKEN: ci-dummy
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # NB: `docker compose config --quiet` suppresses the resolved output
      # but NOT the `variable is not set. Defaulting to a blank string.`
      # warnings, AND it exits 0 regardless. Relying on exit code alone is
      # useless — a newly-referenced `${FOO}` with no default in compose
      # would sail through. Capture stderr, grep for the warning, and fail
      # explicitly. This is the regression guard #51 actually wanted.
      - name: Validate production Compose config
        run: |
          set -euo pipefail
          output=$(docker compose -f docker-compose.yml config --quiet 2>&1)
          if echo "$output" | grep -qi 'variable is not set'; then
            echo "::error::docker-compose.yml references an unset variable — add it to the docker job env or give it a \${VAR:-default} in the compose file"
            echo "$output"
            exit 1
          fi

      - name: Validate dev Compose overlay
        run: |
          set -euo pipefail
          output=$(docker compose -f docker-compose.yml -f docker-compose.dev.yml config --quiet 2>&1)
          if echo "$output" | grep -qi 'variable is not set'; then
            echo "::error::dev overlay references an unset variable — add it to the docker job env or give it a \${VAR:-default} in the compose file"
            echo "$output"
            exit 1
          fi

      # Actually build the production image. The deploy workflow runs
      # `docker compose build app` on the VPS at deploy time; mirroring
      # that command here catches Dockerfile regressions before they
      # reach main. Caddy has its own build context at `./docker/caddy`
      # and is deliberately NOT built here — its Dockerfile is stable
      # (pinned xcaddy + plugin SHA), rarely changes, and adds ~60s of
      # Go compile time per CI run. A Caddy regression will still only
      # surface at deploy time; that is a known, accepted gap.
      - name: Build app image
        run: docker compose -f docker-compose.yml build app
