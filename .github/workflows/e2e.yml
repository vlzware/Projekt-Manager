name: E2E (manual)

# Playwright end-to-end tests, triggered manually from the Actions tab
# ("Run workflow" button). Rationale:
#
#   Iteration 5 consolidation review (H-1) found that CI does not run
#   Playwright, despite the spec's AC-37 claiming "tests in §16 pass".
#   Adding Playwright to the push/PR ci.yml gate would slow every PR by
#   several minutes and add a retry-flakiness surface that the project
#   cannot afford to debug while shipping features. At the same time
#   leaving E2E as local-only means only the developer sees whether the
#   suite still passes — a regression goes unnoticed until the next
#   local run.
#
#   The compromise is this workflow: Playwright stays out of the push/PR
#   gate but is one click away in the Actions tab when an operator wants
#   to validate a commit against the full suite before a manual deploy.
#   See architecture.md §11.7 and verification.md AC-37 for the
#   spec-side description of this topology.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or SHA to test (default: current branch)'
        required: false
        type: string

jobs:
  e2e:
    runs-on: ubuntu-latest

    # Same postgres service container as ci.yml's `check` job — the
    # same env values. Kept in sync by hand for now; a shared reusable
    # workflow would be the next cleanup but is out of scope here.
    services:
      postgres:
        image: postgres:17-alpine
        env:
          # POSTGRES_DB defaults to POSTGRES_USER, so omitting it yields
          # a `pm` database. Playwright overrides DATABASE_URL to
          # `projekt_manager_e2e` in playwright.config.ts and creates
          # that DB via `e2e/ensure-db.mjs` — the value below only
          # needs to be reachable for the service health probe.
          POSTGRES_USER: pm
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pm -d pm"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      # Playwright starts `npm run dev` via playwright.config.ts's
      # `webServer` block, which reads these at startup. STORAGE_*
      # credentials are the capability-restricted app user provisioned by
      # docker/init-storage.sh below — the boot-time bucket-safety probe
      # (#45 / ADR-0022) refuses to start `npm run dev` if these are root
      # creds, so the dev server itself depends on the full provisioning.
      DATABASE_URL: postgresql://pm:postgres@localhost:5432/pm
      # playwright.config.ts reads POSTGRES_PASSWORD to build the isolated
      # E2E DATABASE_URL (`postgresql://pm:<pwd>@.../projekt_manager_e2e`).
      # Locally it comes from `.env` (preloaded by the config). CI has no
      # `.env`, so without this the config falls back to its `changeme`
      # default and the webServer crashes on first connect with "password
      # authentication failed for user pm". Must match the postgres
      # service's POSTGRES_PASSWORD above.
      POSTGRES_PASSWORD: postgres
      STORAGE_ENDPOINT: http://localhost:9000
      STORAGE_BUCKET: projekt-manager
      # Isolated bucket the Playwright suite targets via playwright.config.ts.
      # Provisioned alongside STORAGE_BUCKET by docker/init-storage.sh in the
      # "Start MinIO" step below; the dev bucket exists only because the
      # boot-time bucket-safety probe runs against it before playwright
      # overrides the value for the test runs themselves.
      STORAGE_BUCKET_E2E: projekt-manager-e2e
      STORAGE_ACCESS_KEY: pmappci
      STORAGE_SECRET_KEY: pmappcisecret
      # MinIO accepts any region; us-east-1 is the SDK default.
      STORAGE_REGION: us-east-1
      # NODE_ENV=test matches what vitest uses; the env schema accepts it
      # and the safety checks in assertProductionSafe() do NOT fire.
      NODE_ENV: test
      # Force a clean seed on every run so each invocation starts from
      # the same snapshot regardless of lingering state from a previous run.
      SEED: force
      # Playwright's `CI` env var governs retries, worker count, and
      # `forbidOnly` (see playwright.config.ts).
      CI: 'true'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      # `age` is required by playwright.config.ts, which generates a
      # per-run binary identity via `age-keygen` before spawning the
      # webServer (ADR-0024). Not preinstalled on ubuntu-latest.
      - name: Install apt prerequisites
        run: sudo apt-get update && sudo apt-get install -y age

      # MinIO runs as a docker container started from the runner (not a
      # service container) because GitHub service containers cannot
      # override `command`, and minio/minio needs `server /data` as its
      # argv. Versions are pinned to match docker-compose.yml (ADR-0009).
      #
      # Bucket provisioning is delegated to docker/init-storage.sh so the
      # dev compose recipe and CI stay in lockstep — versioning, Compliance
      # Object Lock, lifecycle, AND a capability-restricted MinIO app user
      # (#45 / ADR-0022). The boot-time bucket-safety probe in
      # src/server/storage/safety.ts runs in start.ts and refuses to serve
      # without the full bucket+user shape, so `npm run dev` (started by
      # Playwright's webServer block) cannot boot otherwise.
      #
      # The script hardcodes `http://storage:9000` as its mc alias target
      # (the compose service hostname). To reuse the script unchanged, MinIO
      # is named `storage` and attached to a user-defined bridge network
      # alongside the mc one-shot — Docker auto-creates DNS entries for
      # container names on user-defined networks. Port 9000 is still
      # published to the runner so the dev server (running on the host)
      # reaches MinIO at http://localhost:9000.
      - name: Start MinIO
        env:
          # Root creds run the MinIO process and are used by the init script
          # for admin operations only — the dev server NEVER runs as root.
          # Hardcoded ephemeral test values; no secret material.
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: changeme
          # Capability-restricted app user (#45 / ADR-0022). The init script
          # provisions this user with a bucket-scoped policy that allows
          # write/read/list/hide but denies s3:DeleteObjectVersion. Must
          # match the STORAGE_ACCESS_KEY / STORAGE_SECRET_KEY in this job's
          # `env:` so `npm run dev` boots under the same restricted user.
          MINIO_APP_ACCESS_KEY: pmappci
          MINIO_APP_SECRET_KEY: pmappcisecret
          STORAGE_BUCKET: projekt-manager
          STORAGE_BUCKET_E2E: projekt-manager-e2e
        run: |
          docker network create pm-storage-net
          docker run -d --name storage \
            --network pm-storage-net \
            -p 9000:9000 \
            -e MINIO_ROOT_USER \
            -e MINIO_ROOT_PASSWORD \
            minio/minio:RELEASE.2025-09-07T16-13-09Z \
            server /data
          for i in {1..30}; do
            if curl -sf http://localhost:9000/minio/health/live > /dev/null; then
              echo "MinIO ready after ${i}s"
              break
            fi
            sleep 1
          done
          # Provision the bucket and the capability-restricted app user via
          # the same script the dev compose stack runs. Mounted read-only;
          # the script itself is idempotent. Network-attached so the
          # script's `mc alias set minio http://storage:9000 ...` resolves.
          docker run --rm --network pm-storage-net \
            -v "$PWD/docker/init-storage.sh:/init-storage.sh:ro" \
            -e MINIO_ROOT_USER \
            -e MINIO_ROOT_PASSWORD \
            -e MINIO_APP_ACCESS_KEY \
            -e MINIO_APP_SECRET_KEY \
            -e STORAGE_BUCKET \
            -e STORAGE_BUCKET_E2E \
            --entrypoint /bin/sh \
            minio/mc:RELEASE.2025-08-13T08-35-41Z \
            /init-storage.sh

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright
        run: npx playwright test
