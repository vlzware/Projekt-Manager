<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1e293b" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Projekt-Manager</title>
    <!--
      Pre-paint theme restoration. Blocks HTML parsing synchronously so
      data-theme is set before any themed content paints. Kept as a
      'self'-origin file (public/theme-init.js) so the app's CSP
      (script-src 'self') permits it without 'unsafe-inline' or a hash.
    -->
    <script src="/theme-init.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
